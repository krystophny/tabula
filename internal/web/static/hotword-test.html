<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hotword Test</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #111; color: #eee; padding: 2rem; }
  h1 { font-size: 1.4rem; margin-bottom: 1rem; }
  #status { font-size: 1.1rem; margin-bottom: 1.5rem; color: #888; }
  #status.ready { color: #4a4; }
  #status.error { color: #c44; }
  #detection { font-size: 3rem; padding: 2rem; text-align: center; border-radius: 1rem;
    background: #1a1a1a; margin-bottom: 1.5rem; transition: background 0.15s; min-height: 7rem;
    display: flex; align-items: center; justify-content: center; }
  #detection.triggered { background: #2a5a2a; }
  .controls { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-bottom: 1rem; }
  button { font-size: 1rem; padding: 0.5rem 1.2rem; border: 1px solid #555; border-radius: 0.4rem;
    background: #222; color: #eee; cursor: pointer; }
  button:hover { background: #333; }
  button:disabled { opacity: 0.4; cursor: default; }
  label { font-size: 0.95rem; }
  input[type=range] { width: 12rem; vertical-align: middle; }
  #log { font-family: monospace; font-size: 0.85rem; background: #0a0a0a; border: 1px solid #333;
    border-radius: 0.4rem; padding: 1rem; max-height: 16rem; overflow-y: auto; white-space: pre-wrap; }
</style>
</head>
<body>
<h1>Wake Word Test — OpenWakeWord (Alexa)</h1>
<div id="status">Loading ONNX models...</div>
<div id="detection">—</div>
<div class="controls">
  <button id="btn-start" disabled>Start Listening</button>
  <button id="btn-stop" disabled>Stop</button>
  <label>Threshold: <input type="range" id="threshold" min="0" max="1" step="0.05" value="0.5">
    <span id="threshold-val">0.50</span></label>
</div>
<div id="log"></div>

<script type="module">
import {
  initHotword, startHotwordMonitor, stopHotwordMonitor,
  isHotwordActive, onHotwordDetected, setHotwordThreshold,
} from '/static/hotword.js';

const statusEl = document.getElementById('status');
const detectionEl = document.getElementById('detection');
const logEl = document.getElementById('log');
const btnStart = document.getElementById('btn-start');
const btnStop = document.getElementById('btn-stop');
const thresholdInput = document.getElementById('threshold');
const thresholdVal = document.getElementById('threshold-val');

let detectionCount = 0;
let flashTimer = null;

function log(msg) {
  const ts = new Date().toLocaleTimeString('en-GB', { hour12: false, fractionalSecondDigits: 1 });
  logEl.textContent += `[${ts}] ${msg}\n`;
  logEl.scrollTop = logEl.scrollHeight;
}

function flash() {
  detectionEl.classList.add('triggered');
  clearTimeout(flashTimer);
  flashTimer = setTimeout(() => detectionEl.classList.remove('triggered'), 800);
}

onHotwordDetected(() => {
  detectionCount++;
  detectionEl.textContent = `Detected (#${detectionCount})`;
  flash();
  log(`Wake word detected (count: ${detectionCount})`);
});

thresholdInput.addEventListener('input', () => {
  const v = setHotwordThreshold(parseFloat(thresholdInput.value));
  thresholdVal.textContent = v.toFixed(2);
  log(`Threshold set to ${v.toFixed(2)}`);
});

btnStart.addEventListener('click', async () => {
  log('Requesting microphone...');
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    await startHotwordMonitor(stream);
    btnStart.disabled = true;
    btnStop.disabled = false;
    log('Listening for wake word.');
  } catch (err) {
    log(`Mic error: ${err.message}`);
  }
});

btnStop.addEventListener('click', () => {
  stopHotwordMonitor();
  btnStart.disabled = false;
  btnStop.disabled = true;
  log('Stopped.');
});

log('Initializing ONNX models...');
try {
  const ok = await initHotword();
  if (ok) {
    statusEl.textContent = 'Models loaded. Click "Start Listening" and say "Alexa".';
    statusEl.className = 'ready';
    btnStart.disabled = false;
    log('ONNX models loaded successfully.');
  } else {
    statusEl.textContent = 'Model init returned false — check console.';
    statusEl.className = 'error';
    log('initHotword() returned false.');
  }
} catch (err) {
  statusEl.textContent = `Init failed: ${err.message}`;
  statusEl.className = 'error';
  log(`Init error: ${err.message}`);
}
</script>
</body>
</html>
