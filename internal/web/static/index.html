<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>タブラ tabura</title>
  <link rel="stylesheet" href="/static/style.css">
  <script>if(!Array.prototype.at){Array.prototype.at=function(i){return i<0?this[this.length+i]:this[i]};String.prototype.at=function(i){return i<0?this[this.length+i]:this[i]}}</script>
</head>
<body>
  <div id="app">
    <div id="view-login" class="view" style="display:none">
      <div class="auth-card">
        <h1>タブラ</h1>
        <p id="login-prompt"></p>
        <form id="login-form" autocomplete="off">
          <input id="login-password" type="password" placeholder="Password" autofocus>
          <button id="btn-login" type="submit">Login</button>
          <div id="login-error" class="error"></div>
        </form>
      </div>
    </div>
    <div id="view-main" class="view" style="display:none">
      <header id="toolbar">
        <span class="brand">タブラ</span>
        <div id="project-tab-strip" role="tablist" aria-label="Projects"></div>
        <button id="btn-projects" class="tab-btn tab-btn-subtle" type="button">Projects</button>
        <span id="status-text">starting...</span>
        <span id="chat-mode-pill" class="badge">chat</span>
        <div class="toolbar-spacer"></div>
      </header>

      <section id="project-overview" class="project-overview is-hidden" aria-label="Project overview">
        <div class="project-overview-head">
          <h2>Projects</h2>
          <button id="btn-projects-close" type="button">Close</button>
        </div>
        <div id="project-cards" class="project-cards" aria-live="polite"></div>
        <form id="project-create-form" autocomplete="off">
          <h3>Add Project</h3>
          <label>
            Name
            <input id="project-create-name" type="text" placeholder="Acme Website">
          </label>
          <label>
            Kind
            <select id="project-create-kind">
              <option value="managed">Managed</option>
              <option value="linked">Linked Path</option>
            </select>
          </label>
          <label id="project-create-path-wrap">
            Path (for linked, optional for managed)
            <input id="project-create-path" type="text" placeholder="/home/you/code/repo">
          </label>
          <div class="project-create-actions">
            <button id="btn-project-create" type="submit">Create Project</button>
          </div>
        </form>
      </section>

      <div id="workspace">
        <div id="canvas-tab-bar" role="tablist" aria-label="Canvas tabs"></div>
        <div id="canvas-viewport">
          <section id="canvas-chat" class="canvas-pane is-active" aria-label="Chat">
            <div id="chat-history" aria-live="polite"></div>
          </section>
          <section id="canvas-text" class="canvas-pane" aria-label="Text artifact" style="display:none"></section>
          <section id="canvas-image" class="canvas-pane" aria-label="Image artifact" style="display:none"><img id="canvas-img" alt="artifact"></section>
          <section id="canvas-pdf" class="canvas-pane" aria-label="PDF artifact" style="display:none"></section>
        </div>
        <form id="prompt-bar" autocomplete="off">
          <span id="prompt-status" class="prompt-status is-idle" aria-live="polite"></span>
          <textarea id="prompt-input" rows="1" placeholder="Message, or hold to speak"></textarea>
          <button id="prompt-send" type="submit">Send</button>
        </form>
      </div>

      <select id="canvas-mark-type" style="display:none">
        <option value="highlight">Highlight</option>
        <option value="underline">Underline</option>
        <option value="strikeout">Strikeout</option>
        <option value="squiggly">Squiggly</option>
        <option value="comment_point">Point Comment</option>
      </select>
      <input id="canvas-mark-comment" type="text" style="display:none">
    </div>
  </div>

  <script src="/static/vendor/mathjax-config.js"></script>
  <script defer src="/static/vendor/mathjax/tex-svg.js"></script>
  <script type="module" src="/static/app.js"></script>
</body>
</html>
